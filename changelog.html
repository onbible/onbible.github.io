<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <title>Histórico de Atualizações — OnBible</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Histórico de atualizações e melhorias do OnBible PWA.">
    <meta name="theme-color" content="#ffffff">

    <link rel="shortcut icon" href="assets/images/favicon.ico">
    <link rel="manifest" href="./manifest.json">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap + Icons -->
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/app.min.css" rel="stylesheet" type="text/css" />

    <!-- marked.js para renderizar o Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg:         #f4f6fb;
            --surface:    #ffffff;
            --border:     #e5e7eb;
            --text:       #1f2937;
            --muted:      #6b7280;
            --accent:     #4f46e5;
            --accent-bg:  #eef2ff;
            --add-color:  #16a34a;
            --add-bg:     #dcfce7;
            --fix-color:  #dc2626;
            --fix-bg:     #fee2e2;
            --change-color: #d97706;
            --change-bg:  #fef3c7;
            --remove-color: #6b7280;
            --remove-bg:  #f3f4f6;
            --timeline-color: #e0e7ff;
        }
        body.dark {
            --bg:         #0f0e1a;
            --surface:    #1c1c2e;
            --border:     #2a2a40;
            --text:       #e2e8f0;
            --muted:      #6b7280;
            --accent:     #818cf8;
            --accent-bg:  #1e1b4b;
            --add-color:  #4ade80;
            --add-bg:     #14532d;
            --fix-color:  #f87171;
            --fix-bg:     #7f1d1d;
            --change-color: #fbbf24;
            --change-bg:  #78350f;
            --remove-color: #9ca3af;
            --remove-bg:  #1f2937;
            --timeline-color: #1e1b4b;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        /* ── TOPBAR ─────────────────────────── */
        .cl-topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 60px;
        }
        .cl-topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cl-topbar a.back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .cl-topbar a.back-btn:hover { background: var(--accent-bg); }
        .cl-topbar h1 {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            color: var(--text);
        }
        .dark-toggle-btn {
            background: var(--accent-bg);
            color: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .dark-toggle-btn:hover { opacity: 0.85; }

        /* ── HERO ───────────────────────────── */
        .cl-hero {
            background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
            color: #fff;
            padding: 48px 24px 40px;
            text-align: center;
        }
        .cl-hero h2 {
            font-size: clamp(22px, 4vw, 36px);
            font-weight: 800;
            margin: 0 0 8px;
            letter-spacing: -0.02em;
        }
        .cl-hero p {
            margin: 0;
            opacity: 0.85;
            font-size: 15px;
        }
        .cl-hero .badge-hero {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 999px;
            padding: 4px 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            margin-bottom: 16px;
        }

        /* ── CONTENT ────────────────────────── */
        .cl-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── LOADING ────────────────────────── */
        .cl-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            gap: 16px;
            color: var(--muted);
        }
        .cl-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── VERSION BLOCK ──────────────────── */
        .version-block {
            position: relative;
            padding-left: 32px;
            margin-bottom: 48px;
        }
        .version-block::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 28px;
            bottom: -48px;
            width: 2px;
            background: var(--timeline-color);
        }
        .version-block:last-child::before { display: none; }

        .version-dot {
            position: absolute;
            left: 0;
            top: 6px;
            width: 22px;
            height: 22px;
            background: var(--accent);
            border-radius: 50%;
            border: 3px solid var(--bg);
            box-shadow: 0 0 0 2px var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .version-dot.unreleased {
            background: #f59e0b;
            box-shadow: 0 0 0 2px #f59e0b;
        }
        .version-dot i { color: #fff; font-size: 9px; }

        .version-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .version-tag {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .version-tag.unreleased { color: #f59e0b; }
        .version-date {
            font-size: 12px;
            color: var(--muted);
            background: var(--border);
            border-radius: 999px;
            padding: 2px 10px;
        }

        /* ── CATEGORY ───────────────────────── */
        .category-block {
            margin-bottom: 20px;
        }
        .category-title {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 6px;
            padding: 3px 10px;
            margin-bottom: 10px;
        }
        .cat-adicionado  { color: var(--add-color);    background: var(--add-bg); }
        .cat-corrigido   { color: var(--fix-color);    background: var(--fix-bg); }
        .cat-alterado    { color: var(--change-color); background: var(--change-bg); }
        .cat-removido    { color: var(--remove-color); background: var(--remove-bg); }

        .category-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .category-list li {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            transition: box-shadow 0.15s;
        }
        .category-list li:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .category-list li::before {
            content: '•';
            color: var(--muted);
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* ── RESPONSIVE ─────────────────────── */
        @media (max-width: 600px) {
            .cl-topbar { padding: 0 16px; }
            .cl-content { padding: 24px 16px 100px; }
            .cl-hero { padding: 36px 16px 28px; }
        }

        /* ── BOTTOM NAV ─────────────────────── */
        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            z-index: 10000;
        }
        .mobile-bottom-nav ul {
            display: flex; height: 100%;
            margin: 0; padding: 0; list-style: none;
        }
        .mobile-bottom-nav ul li { flex: 1; }
        .mobile-bottom-nav ul li a {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; gap: 3px;
            color: #9ca3af; text-decoration: none;
            font-size: 10px; font-weight: 500;
            font-family: 'Inter', system-ui, sans-serif;
            transition: color 0.15s;
        }
        .mobile-bottom-nav ul li a i { font-size: 20px; }
        .mobile-bottom-nav ul li a:hover { color: #4f46e5; }
        @media (max-width: 768px) {
            .mobile-bottom-nav { display: block; }
            body { padding-bottom: 60px; }
        }
    </style>
</head>
<body>

    <!-- Aplicar dark mode antes de renderizar -->
    <script>
        if (localStorage.getItem('dark_mode') === '1') {
            document.body.classList.add('dark');
        }
    </script>

    <!-- Topbar -->
    <header class="cl-topbar">
        <div class="cl-topbar-left">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Início
            </a>
            <h1><i class="fas fa-history" style="color: var(--accent); margin-right: 6px;"></i>Atualizações</h1>
        </div>
        <button class="dark-toggle-btn" onclick="toggleDark()" title="Alternar tema">
            <i class="fas fa-moon" id="dark-icon"></i>
        </button>
    </header>

    <!-- Hero -->
    <div class="cl-hero">
        <div class="badge-hero">
            <i class="fas fa-scroll"></i> CHANGELOG
        </div>
        <h2>Histórico de Atualizações</h2>
        <p>Acompanhe cada melhoria, correção e funcionalidade nova do OnBible.</p>
    </div>

    <!-- Content -->
    <main class="cl-content" id="cl-content">
        <div class="cl-loading" id="cl-loading">
            <div class="cl-spinner"></div>
            <span>Carregando histórico…</span>
        </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="mobile-bottom-nav">
        <ul>
            <li><a href="index.html"><i class="fas fa-book"></i><span>Bíblia</span></a></li>
            <li><a href="bible_play.html"><i class="fas fa-headphones"></i><span>Ouvir</span></a></li>
            <li><a href="settings.html"><i class="fas fa-cog"></i><span>Config.</span></a></li>
        </ul>
    </nav>

    <script>
        // ── Dark Mode ──────────────────────────────
        function toggleDark() {
            var isDark = document.body.classList.toggle('dark');
            localStorage.setItem('dark_mode', isDark ? '1' : '0');
            document.getElementById('dark-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        if (document.body.classList.contains('dark')) {
            document.getElementById('dark-icon').className = 'fas fa-sun';
        }

        // ── Changelog Renderer ─────────────────────
        const CATEGORY_CONFIG = {
            'adicionado': { label: '✦ Adicionado', cls: 'cat-adicionado' },
            'corrigido':  { label: '✔ Corrigido',  cls: 'cat-corrigido'  },
            'alterado':   { label: '↻ Alterado',   cls: 'cat-alterado'   },
            'removido':   { label: '✕ Removido',   cls: 'cat-removido'   },
        };

        function parseChangelog(md) {
            const lines = md.split('\n');
            const versions = [];
            let currentVersion = null;
            let currentCategory = null;

            for (const raw of lines) {
                const line = raw.trim();

                // ## [Unreleased] or ## [1.5.0] — 2026-03-27
                const verMatch = line.match(/^##\s+\[(.+?)\](?:\s*[—–-]\s*(.+))?/);
                if (verMatch) {
                    currentVersion = { name: verMatch[1], date: verMatch[2] || null, categories: [] };
                    versions.push(currentVersion);
                    currentCategory = null;
                    continue;
                }

                // ### Adicionado / Corrigido / etc.
                const catMatch = line.match(/^###\s+(.+)/);
                if (catMatch && currentVersion) {
                    const key = catMatch[1].toLowerCase()
                        .normalize('NFD').replace(/[\u0300-\u036f]/g, ''); // remove accents for key
                    currentCategory = { raw: catMatch[1], key, items: [] };
                    currentVersion.categories.push(currentCategory);
                    continue;
                }

                // - item
                if (line.startsWith('- ') && currentCategory) {
                    currentCategory.items.push(line.slice(2));
                }
            }
            return versions;
        }

        function buildVersionHTML(version) {
            const isUnreleased = version.name.toLowerCase() === 'unreleased';

            const dotClass = isUnreleased ? 'version-dot unreleased' : 'version-dot';
            const dotIcon  = isUnreleased ? 'fas fa-bolt' : 'fas fa-tag';
            const tagClass = isUnreleased ? 'version-tag unreleased' : 'version-tag';
            const tagLabel = isUnreleased ? '⚡ Em desenvolvimento' : `v${version.name}`;
            const dateHTML = version.date
                ? `<span class="version-date"><i class="fas fa-calendar-alt" style="margin-right:4px;"></i>${version.date}</span>`
                : '';

            let categoriesHTML = '';
            for (const cat of version.categories) {
                if (!cat.items.length) continue;
                const cfg = CATEGORY_CONFIG[cat.key] || { label: cat.raw, cls: '' };
                const items = cat.items.map(item => {
                    // render inline markdown (bold, code)
                    const rendered = item
                        .replace(/`([^`]+)`/g, '<code style="font-size:12px;background:rgba(0,0,0,0.07);padding:1px 5px;border-radius:4px;">$1</code>')
                        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    return `<li>${rendered}</li>`;
                }).join('');

                categoriesHTML += `
                    <div class="category-block">
                        <div class="category-title ${cfg.cls}">${cfg.label}</div>
                        <ul class="category-list">${items}</ul>
                    </div>`;
            }

            if (!categoriesHTML) {
                categoriesHTML = '<p style="color:var(--muted);font-size:14px;">Nenhuma mudança registrada ainda.</p>';
            }

            return `
            <div class="version-block">
                <div class="${dotClass}"><i class="${dotIcon}"></i></div>
                <div class="version-header">
                    <span class="${tagClass}">${tagLabel}</span>
                    ${dateHTML}
                </div>
                ${categoriesHTML}
            </div>`;
        }

        async function loadChangelog() {
            try {
                const res = await fetch('CHANGELOG.md?v=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const md = await res.text();
                const versions = parseChangelog(md);

                const html = versions.map(buildVersionHTML).join('');
                document.getElementById('cl-content').innerHTML = html;
            } catch (err) {
                document.getElementById('cl-content').innerHTML = `
                    <div style="text-align:center;padding:60px 24px;color:var(--muted);">
                        <i class="fas fa-exclamation-triangle" style="font-size:40px;margin-bottom:16px;color:#f59e0b;"></i>
                        <p>Não foi possível carregar o changelog.</p>
                        <small>${err.message}</small>
                    </div>`;
            }
        }

        loadChangelog();
    </script>
</body>
</html>
