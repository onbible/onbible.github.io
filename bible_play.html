                        <style>
                            @keyframes skeleton-shimmer {
                                0% { background-position: -400px 0; }
                                100% { background-position: 400px 0; }
                            }
                            .skeleton-card {
                                border-radius: 8px;
                                overflow: hidden;
                                box-shadow: 0 2px 8px rgba(0,0,0,0.06);
                            }
                            .skeleton-block {
                                background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
                                background-size: 400px 100%;
                                animation: skeleton-shimmer 1.4s infinite;
                                border-radius: 4px;
                            }
                        </style>

                        <!-- Skeleton Loader -->
                        <div id="skeleton-loader" class="row">
                            <script>
                                for (var i = 0; i < 8; i++) {
                                    document.write('\
                                    <div class="col-xl-3 col-md-6 mb-4">\
                                        <div class="card skeleton-card" style="height:90px; padding:16px;">\
                                            <div class="skeleton-block mb-2" style="height:18px; width:70%;"></div>\
                                            <div class="skeleton-block" style="height:14px; width:45%;"></div>\
                                        </div>\
                                    </div>');
                                }
                            </script>
                        </div>

    <!-- Mobile Bottom Navigation -->
    <style>
        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: #ffffff;
            border-top: 1px solid #e5e7eb;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            z-index: 10000;
        }
        .mobile-bottom-nav ul {
            display: flex;
            height: 100%;
            margin: 0; padding: 0;
            list-style: none;
        }
        .mobile-bottom-nav ul li { flex: 1; }
        .mobile-bottom-nav ul li a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 3px;
            color: #9ca3af;
            text-decoration: none;
            font-size: 10px;
            font-weight: 500;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: color 0.15s ease;
        }
        .mobile-bottom-nav ul li a i { font-size: 20px; line-height: 1; }
        .mobile-bottom-nav ul li a.active,
        .mobile-bottom-nav ul li a:hover { color: #4f46e5; }
        @media (max-width: 768px) {
            .mobile-bottom-nav { display: block; }
            body { padding-bottom: 60px; }
            .vertical-menu { display: none !important; }
            .main-content { margin-left: 0 !important; }

    </style>
