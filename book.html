    <!-- Settings Sidebar -->
    <style>
        .reading-sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100vh;
            background: #fff;
            z-index: 9999;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .reading-sidebar.show {
            right: 0;
        }
        .reading-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eff2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .reading-sidebar-body {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }
        .reading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9998;
        }
    </style>

        </div>
